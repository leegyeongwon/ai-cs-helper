project:
  title: AI CS Helper
  summary: AI의 효율성과 인간 상담원의 신뢰성을 결합한 LLM·RAG 기반 사업체 맞춤형 CS 자동화 솔루션
  category: AI 서비스
  keywords:
    - AI
    - RAG
    - LLM
    - CS자동화
    - 고객상담

problem:
  summary: 제한된 인력과 반복적인 단순 문의로 고객 응대가 지연되고 운영비용이 높으며, 상담원별 규정 숙지 편차로 답변 품질이 불균형하다
  target_users:
    - CS 운영이 필요한 사업체

solution:
  summary: 문의를 카테고리 분류·지능형 라우팅한 뒤 RAG 기반으로 답변을 생성하고, 인간 상담원의 최종 검토·수정을 거쳐 등록하는 검증 중심 워크플로우
  main_features:
    - AI가 문의를 자동 카테고리 분류하고 답변 초안을 자동 생성
    - RAG 기반 답변 생성으로 사업체 규정에 부합하는 일관된 응대
    - 문의 성격에 따라 AI 또는 인간 상담원으로 지능형 라우팅
    - 인간 상담원의 최종 검토·수정을 필수화한 검증 중심 워크플로우
    - RAGAS로 RAG 답변·검색 성능을 정량 평가

tech_stack:
  frontend:
    - HTML
    - CSS
    - JavaScript
  backend:
    - Python (FastAPI)
    - LangGraph
  ai:
    - Solar Pro 3
    - Gemini 3 Flash preview (fallback)
    - Solar Embedding2 (query/passage)
    - LiteLLM (LLM Gateway)
    - RAGAS (RAG 평가)
  database:
    - Supabase (PostgreSQL + pgvector)
  infra:
    - Docker / Docker Compose
    - GitHub Actions (CI/CD)
    - GCP

