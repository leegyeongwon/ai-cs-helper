services:
  backend:
    profiles:
      - backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      LITELLM_BASE_URL: http://litellm:4000/v1
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - litellm

  litellm:
    image: docker.litellm.ai/berriai/litellm:latest
    env_file:
      - .env
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
    ports:
      - "4000:4000"
